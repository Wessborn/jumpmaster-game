<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Tap & Stack - построй башню!</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e 0%, #0f0f1a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            background: rgba(30, 30, 50, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,215,0,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 28px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5);
            cursor: pointer;
            touch-action: manipulation;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 12px 28px;
            background: #0f0f1e;
            border-radius: 60px;
            gap: 35px;
            border-bottom: 2px solid #ffd966;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9b9bcb;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #ffd966;
            text-shadow: 0 0 6px #ffaa33;
            line-height: 1;
        }

        .best-value {
            color: #7effb0;
            text-shadow: 0 0 4px #00ff99;
        }

        button {
            background: linear-gradient(135deg, #4a4a8a, #2a2a5a);
            border: none;
            padding: 10px 32px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 16px;
            color: #ffefc0;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 5px 0 #1a1a3a;
            font-family: inherit;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a3a;
        }

        .controls {
            margin-top: 16px;
            text-align: center;
            color: #a0a0d0;
            font-size: 12px;
            font-weight: 500;
        }

        @media (max-width: 560px) {
            .stat-value { font-size: 26px; }
            button { padding: 6px 24px; font-size: 14px; }
            .game-container { padding: 12px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="gameCanvas" width="380" height="600"></canvas>
        <div class="info-bar">
            <div class="stat">
                <div class="stat-label">🏆 ВЫСОТА</div>
                <div class="stat-value" id="scoreDisplay">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">⭐ РЕКОРД</div>
                <div class="stat-value best-value" id="bestDisplay">0</div>
            </div>
            <button id="restartButton">🔄 НАЧАТЬ</button>
        </div>
        <div class="controls">
            👆 НАЖМИ / КОСНИСЬ — ПОСТАВЬ БЛОК! 🧱
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreDisplay');
    const bestSpan = document.getElementById('bestDisplay');
    const restartBtn = document.getElementById('restartButton');

    // Параметры игры
    const W = 380, H = 600;
    let gameActive = true;
    let score = 0;
    let best = 0;
    
    // Блоки
    let blocks = [];
    let currentBlock = {
        x: 0,
        y: 0,
        width: 60,
        height: 22,
        dir: 1,
        speed: 2.8
    };
    
    let lastBlockWidth = 60;
    let lastBlockX = (W - 60) / 2;
    let nextBlockY = H - 65;
    let isWaitingForTap = true;
    
    // Анимация частиц
    let particles = [];
    
    // Цветовая схема
    const colors = [
        '#FF6B6B', '#4ECDC4', '#FFE66D', '#FF8C42', '#6C63FF', '#FF4D6D', '#00B4D8'
    ];
    
    // Загрузка рекорда
    function loadBest() {
        const saved = localStorage.getItem('tapStackBest');
        if (saved && !isNaN(parseInt(saved))) {
            best = parseInt(saved);
            bestSpan.innerText = best;
        }
    }
    
    function saveBest() {
        if (score > best) {
            best = score;
            bestSpan.innerText = best;
            localStorage.setItem('tapStackBest', best);
        }
    }
    
    // Добавление частиц
    function addParticles(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
            particles.push({
                x: x + (Math.random() - 0.5) * 25,
                y: y + (Math.random() - 0.5) * 20,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4 - 2,
                life: 1,
                color: color,
                size: 3 + Math.random() * 5
            });
        }
    }
    
    // Сброс игры
    function restartGame() {
        gameActive = true;
        score = 0;
        scoreSpan.innerText = '0';
        blocks = [];
        lastBlockWidth = 62;
        lastBlockX = (W - 62) / 2;
        nextBlockY = H - 68;
        isWaitingForTap = true;
        particles = [];
        
        currentBlock.width = 62;
        currentBlock.height = 24;
        currentBlock.x = (W - currentBlock.width) / 2;
        currentBlock.y = nextBlockY;
        currentBlock.dir = 1;
        currentBlock.speed = 2.5;
        
        saveBest();
    }
    
    // Основная логика: размещение блока
    function placeBlock() {
        if (!gameActive) return;
        
        const newX = currentBlock.x;
        const prevX = lastBlockX;
        const prevW = lastBlockWidth;
        
        // Проверка промаха (мимо)
        if (newX + currentBlock.width < prevX || newX > prevX + prevW) {
            gameActive = false;
            addParticles(currentBlock.x + currentBlock.width/2, currentBlock.y, '#FF4444', 20);
            return;
        }
        
        // Вычисляем пересечение (новый блок)
        let overlapLeft = Math.max(newX, prevX);
        let overlapRight = Math.min(newX + currentBlock.width, prevX + prevW);
        let newWidth = overlapRight - overlapLeft;
        
        if (newWidth <= 2) {
            gameActive = false;
            addParticles(currentBlock.x + currentBlock.width/2, currentBlock.y, '#FF4444', 20);
            return;
        }
        
        // Успех! добавляем блок в массив
        const blockColor = colors[blocks.length % colors.length];
        blocks.push({
            x: overlapLeft,
            y: nextBlockY,
            width: newWidth,
            height: currentBlock.height,
            color: blockColor
        });
        
        addParticles(overlapLeft + newWidth/2, nextBlockY, blockColor, 15);
        
        // Увеличиваем счёт
        score++;
        scoreSpan.innerText = score;
        saveBest();
        
        // Обновляем последний блок
        lastBlockX = overlapLeft;
        lastBlockWidth = newWidth;
        nextBlockY -= currentBlock.height + 1;
        
        // Создаём новый движущийся блок
        currentBlock.width = newWidth;
        currentBlock.y = nextBlockY;
        
        // Увеличиваем скорость со временем
        let newSpeed = 2.5 + score * 0.07;
        currentBlock.speed = Math.min(newSpeed, 8);
        
        // Начальная позиция (движение вправо или влево)
        if (Math.random() > 0.5) {
            currentBlock.x = 0;
            currentBlock.dir = 1;
        } else {
            currentBlock.x = W - currentBlock.width;
            currentBlock.dir = -1;
        }
        
        isWaitingForTap = true;
        
        // Проверка победы (если башня достигла верха)
        if (nextBlockY <= 40) {
            gameActive = false;
            addParticles(W/2, H/2, '#FFD700', 50);
        }
    }
    
    // Обновление положения текущего блока
    function updateMovingBlock() {
        if (!gameActive || isWaitingForTap) return;
        
        currentBlock.x += currentBlock.speed * currentBlock.dir;
        
        if (currentBlock.x <= 0) {
            currentBlock.x = 0;
            currentBlock.dir = 1;
        }
        if (currentBlock.x + currentBlock.width >= W) {
            currentBlock.x = W - currentBlock.width;
            currentBlock.dir = -1;
        }
    }
    
    // Обработка тапа
    function handleTap() {
        if (!gameActive) return;
        if (isWaitingForTap) {
            isWaitingForTap = false;
        } else {
            placeBlock();
        }
    }
    
    // Обновление частиц
    function updateParticles() {
        for (let i = 0; i < particles.length; i++) {
            particles[i].x += particles[i].vx;
            particles[i].y += particles[i].vy;
            particles[i].life -= 0.025;
            if (particles[i].life <= 0 || particles[i].y > H + 50) {
                particles.splice(i, 1);
                i--;
            }
        }
    }
    
    // Отрисовка
    function draw() {
        ctx.clearRect(0, 0, W, H);
        
        // Фон (градиент)
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#1e1e3a');
        grad.addColorStop(1, '#0d0d1a');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        // Сетка (эффект глубины)
        ctx.strokeStyle = 'rgba(100,100,180,0.15)';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < H; i += 30) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(W, i);
            ctx.stroke();
        }
        
        // Отрисовка поставленных блоков
        for (let i = 0; i < blocks.length; i++) {
            const b = blocks[i];
            ctx.shadowBlur = 6;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.width, b.height - 1);
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.fillRect(b.x + 2, b.y + 2, b.width - 4, 4);
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(b.x, b.y + b.height - 4, b.width, 3);
        }
        
        // Текущий движущийся блок
        if (gameActive && isWaitingForTap === false) {
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffaa55';
            ctx.fillStyle = '#FFB347';
            ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, currentBlock.height - 1);
            ctx.fillStyle = 'rgba(255,240,180,0.5)';
            ctx.fillRect(currentBlock.x + 3, currentBlock.y + 2, currentBlock.width - 6, 5);
        } else if (gameActive && isWaitingForTap) {
            // Блок ожидания (полупрозрачный)
            ctx.fillStyle = 'rgba(255,180,80,0.5)';
            ctx.fillRect(currentBlock.x, currentBlock.y, currentBlock.width, currentBlock.height - 1);
            ctx.fillStyle = 'rgba(255,255,200,0.3)';
            ctx.fillRect(currentBlock.x + 2, currentBlock.y + 2, currentBlock.width - 4, 4);
        }
        
        // Частицы
        for (const p of particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x - 2, p.y - 2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
        
        // Линия отсечения (верх)
        ctx.beginPath();
        ctx.strokeStyle = '#ffd966';
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 8]);
        ctx.moveTo(0, 42);
        ctx.lineTo(W, 42);
        ctx.stroke();
        ctx.setLineDash([]);
        
        // Текст Game Over
        if (!gameActive) {
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(0, 0, W, H);
            ctx.font = 'bold 28 "Segoe UI"';
            ctx.fillStyle = '#FFD966';
            ctx.shadowBlur = 0;
            ctx.fillText('GAME OVER', W/2 - 100, H/2 - 45);
            ctx.font = 'bold 18 monospace';
            ctx.fillStyle = '#ddddff';
            ctx.fillText('нажми СТАРТ', W/2 - 68, H/2 + 25);
        }
        
        // Отображение счёта сверху
        ctx.font = 'bold 18 monospace';
        ctx.fillStyle = '#cceeff';
        ctx.fillText(`БЛОКОВ: ${score}`, 15, 32);
    }
    
    // Анимация
    function update() {
        updateMovingBlock();
        updateParticles();
        draw();
        requestAnimationFrame(update);
    }
    
    // Инициализация
    function init() {
        loadBest();
        restartGame();
        update();
        
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            handleTap();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap();
        });
        restartBtn.addEventListener('click', () => {
            restartGame();
            gameActive = true;
            isWaitingForTap = true;
            blocks = [];
            lastBlockWidth = 62;
            lastBlockX = (W - 62) / 2;
            nextBlockY = H - 68;
            currentBlock.width = 62;
            currentBlock.x = (W - 62) / 2;
            currentBlock.y = nextBlockY;
            score = 0;
            scoreSpan.innerText = '0';
            saveBest();
        });
    }
    
    init();
</script>
</body>
</html>
