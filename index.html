<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Collector - космический сборщик</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Orbitron', monospace;
            overflow: hidden;
        }

        .game-wrapper {
            background: linear-gradient(135deg, #1a1a3e, #0f0f2a);
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 30px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            border: 1px solid rgba(100,150,255,0.3);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0,100,255,0.3);
            cursor: pointer;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 12px 30px;
            background: #0a0a1f;
            border-radius: 60px;
            gap: 40px;
            border: 1px solid #2a4a8a;
        }

        .stat {
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #7a9bcb;
            font-weight: bold;
        }

        .stat-value {
            font-size: 34px;
            font-weight: bold;
            color: #f0c674;
            text-shadow: 0 0 8px #ffaa33;
            font-family: 'Orbitron', monospace;
        }

        .best-value {
            color: #6effb0;
            text-shadow: 0 0 5px #00ff80;
        }

        button {
            background: linear-gradient(135deg, #3a6ea5, #1e3a5f);
            border: none;
            padding: 10px 32px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            color: #f0f4ff;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            transition: 0.07s linear;
            box-shadow: 0 5px 0 #0f2a4a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f2a4a;
        }

        .hint {
            margin-top: 16px;
            text-align: center;
            color: #8ab3ff;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @media (max-width: 580px) {
            .stat-value { font-size: 24px; }
            button { padding: 6px 22px; font-size: 13px; }
            .game-wrapper { padding: 12px; }
        }
    </style>
</head>
<body>
<div>
    <div class="game-wrapper">
        <canvas id="gameCanvas" width="700" height="500"></canvas>
        <div class="stats-panel">
            <div class="stat">
                <div class="stat-label">✨ ЗВЁЗДЫ</div>
                <div class="stat-value" id="scoreValue">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">🏆 РЕКОРД</div>
                <div class="stat-value best-value" id="bestValue">0</div>
            </div>
            <button id="resetGameBtn">🔄 НОВАЯ ИГРА</button>
        </div>
        <div class="hint">
            🖱️ ДВИГАЙ МЫШЬЮ / ПАЛЬЦЕМ — ЛОВИ ЗВЁЗДЫ | ОСТОРОЖНО — МЕТЕОРИТЫ! 💥
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreSpan = document.getElementById('scoreValue');
    const bestSpan = document.getElementById('bestValue');
    const resetBtn = document.getElementById('resetGameBtn');

    // Размеры
    const W = 700, H = 500;
    let gameRunning = true;
    let score = 0;
    let bestScore = 0;
    let frame = 0;
    
    // Корабль игрока
    let player = {
        x: W/2,
        y: H - 70,
        radius: 16,
        speed: 6.5
    };
    
    // Звёзды (сбор)
    let stars = [];
    // Метеориты (опасность)
    let meteors = [];
    
    // Эффекты частиц
    let particles = [];
    
    // Загрузка рекорда
    function loadBest() {
        const saved = localStorage.getItem('cosmicCollectorBest');
        if (saved && !isNaN(parseInt(saved))) {
            bestScore = parseInt(saved);
            bestSpan.innerText = bestScore;
        }
    }
    
    function saveBest() {
        if (score > bestScore) {
            bestScore = score;
            bestSpan.innerText = bestScore;
            localStorage.setItem('cosmicCollectorBest', bestScore);
        }
    }
    
    // Сброс игры
    function resetGame() {
        gameRunning = true;
        score = 0;
        scoreSpan.innerText = '0';
        stars = [];
        meteors = [];
        particles = [];
        frame = 0;
        // начальные звёзды
        for(let i = 0; i < 8; i++) {
            spawnStar();
        }
        saveBest();
    }
    
    // Создание звезды
    function spawnStar() {
        stars.push({
            x: Math.random() * (W - 30) + 15,
            y: Math.random() * (H - 150) + 20,
            radius: 5 + Math.random() * 4,
            value: 1,
            twinkle: Math.random() * Math.PI * 2
        });
    }
    
    // Создание метеорита
    function spawnMeteor() {
        meteors.push({
            x: Math.random() * (W - 50) + 25,
            y: -30,
            radius: 10 + Math.random() * 8,
            speedY: 2 + Math.random() * 3.5,
            speedX: (Math.random() - 0.5) * 1.5,
            rotation: 0
        });
    }
    
    // Частицы при сборе
    function addParticles(x, y, color) {
        for(let i = 0; i < 8; i++) {
            particles.push({
                x: x, y: y,
                vx: (Math.random() - 0.5) * 4,
                vy: (Math.random() - 0.5) * 4 - 2,
                life: 1,
                color: color,
                size: 3 + Math.random() * 4
            });
        }
    }
    
    // Обновление игры
    function updateGame() {
        if (!gameRunning) return;
        
        // Движение мыши / касания (наведение)
        // в обработчиках событий, здесь просто проверка
        
        // Спавн звёзд
        if (stars.length < 12 && Math.random() < 0.02) {
            spawnStar();
        }
        
        // Спавн метеоритов (со временем всё чаще)
        let meteorChance = 0.008 + score / 1500;
        if (Math.random() < meteorChance && meteors.length < 12) {
            spawnMeteor();
        }
        
        // Обновление звёзд (мерцание)
        for (let i = 0; i < stars.length; i++) {
            const s = stars[i];
            s.twinkle += 0.05;
            // Проверка сбора (коллизия с игроком)
            const dx = player.x - s.x;
            const dy = player.y - s.y;
            const dist = Math.hypot(dx, dy);
            if (dist < player.radius + s.radius) {
                // собираем звезду
                score++;
                scoreSpan.innerText = score;
                addParticles(s.x, s.y, '#FFD966');
                stars.splice(i,1);
                i--;
                saveBest();
                continue;
            }
            // звёзды медленно дрейфуют
            s.y += 0.15;
            if (s.y > H + 30) {
                stars.splice(i,1);
                i--;
            }
        }
        
        // Обновление метеоритов
        for (let i = 0; i < meteors.length; i++) {
            const m = meteors[i];
            m.y += m.speedY;
            m.x += m.speedX;
            m.rotation += 0.1;
            
            // коллизия с игроком
            const dx = player.x - m.x;
            const dy = player.y - m.y;
            if (Math.hypot(dx, dy) < player.radius + m.radius) {
                gameRunning = false;
                addParticles(m.x, m.y, '#ff4444');
                meteors.splice(i,1);
                break;
            }
            
            // удаление за экраном
            if (m.y > H + 80 || m.x < -80 || m.x > W + 80) {
                meteors.splice(i,1);
                i--;
            }
        }
        
        // Обновление частиц
        for (let i=0; i<particles.length; i++) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 0.02;
            if (p.life <= 0 || p.y > H+50) {
                particles.splice(i,1);
                i--;
            }
        }
        
        frame++;
    }
    
    // Отрисовка
    function draw() {
        ctx.clearRect(0, 0, W, H);
        
        // Звёздное поле фон
        ctx.fillStyle = '#050510';
        ctx.fillRect(0, 0, W, H);
        for(let i=0; i<150; i++) {
            if(i%2 === 0) continue;
            ctx.fillStyle = `rgba(255,255,200,${0.2+Math.sin(Date.now()*0.001+i)*0.1})`;
            ctx.beginPath();
            ctx.arc( (i*131)%W, (i*253)%H, 1.5, 0, Math.PI*2);
            ctx.fill();
        }
        
        // Туманности
        ctx.fillStyle = 'rgba(80,40,120,0.2)';
        ctx.beginPath();
        ctx.ellipse(120, 300, 200, 100, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = 'rgba(30,80,150,0.2)';
        ctx.beginPath();
        ctx.ellipse(550, 150, 180, 120, 0, 0, Math.PI*2);
        ctx.fill();
        
        // Звёзды (сборные)
        for (const s of stars) {
            const glow = 0.6 + Math.sin(s.twinkle) * 0.4;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ffcc55';
            ctx.fillStyle = `rgba(255, 215, 100, ${glow})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#fff5b0';
            ctx.beginPath();
            ctx.arc(s.x-1, s.y-1, s.radius*0.4, 0, Math.PI*2);
            ctx.fill();
        }
        
        // Метеориты
        for (const m of meteors) {
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ff5500';
            ctx.fillStyle = '#8b5a2b';
            ctx.beginPath();
            ctx.ellipse(m.x, m.y, m.radius, m.radius*0.7, m.rotation, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#b87c3a';
            ctx.beginPath();
            ctx.ellipse(m.x-2, m.y-1, m.radius*0.5, m.radius*0.4, m.rotation, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = '#5a3a1a';
            for(let i=0;i<3;i++) {
                ctx.fillRect(m.x-4+i*4, m.y+2, 2, 4);
            }
        }
        
        // Частицы
        for (const p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life;
            ctx.fillRect(p.x-2, p.y-2, p.size, p.size);
        }
        ctx.globalAlpha = 1;
        
        // Корабль игрока (звездолёт)
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00a6ff';
        ctx.fillStyle = '#4cb4ff';
        ctx.beginPath();
        ctx.moveTo(player.x, player.y - 18);
        ctx.lineTo(player.x + 18, player.y + 6);
        ctx.lineTo(player.x + 8, player.y + 2);
        ctx.lineTo(player.x + 8, player.y + 12);
        ctx.lineTo(player.x, player.y + 8);
        ctx.lineTo(player.x - 8, player.y + 12);
        ctx.lineTo(player.x - 8, player.y + 2);
        ctx.lineTo(player.x - 18, player.y + 6);
        ctx.fill();
        ctx.fillStyle = '#ffaa44';
        ctx.beginPath();
        ctx.arc(player.x, player.y-4, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(player.x-2, player.y-7, 2, 0, Math.PI*2);
        ctx.fill();
        
        // Двигатель
        ctx.fillStyle = '#ff884d';
        ctx.beginPath();
        ctx.moveTo(player.x-6, player.y+12);
        ctx.lineTo(player.x, player.y+22);
        ctx.lineTo(player.x+6, player.y+12);
        ctx.fill();
        
        ctx.shadowBlur = 0;
        
        // Game Over
        if (!gameRunning) {
            ctx.fillStyle = 'rgba(0,0,0,0.8)';
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#ffcc66';
            ctx.font = 'bold 36 "Orbitron"';
            ctx.shadowBlur = 0;
            ctx.fillText('GAME OVER', W/2-130, H/2-40);
            ctx.font = '20 monospace';
            ctx.fillStyle = '#aaffdd';
            ctx.fillText('нажми "НОВАЯ ИГРА"', W/2-130, H/2+40);
        }
        
        // Счёт на экране
        ctx.font = 'bold 26 "Orbitron"';
        ctx.fillStyle = '#ffe6aa';
        ctx.fillText('⭐ '+score, W-100, 55);
    }
    
    // Обработка движения мыши/пальца
    function handleMove(e) {
        if (!gameRunning) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        let clientX;
        if (e.touches) {
            clientX = e.touches[0].clientX;
        } else {
            clientX = e.clientX;
        }
        let canvasX = (clientX - rect.left) * scaleX;
        canvasX = Math.min(Math.max(canvasX, player.radius + 10), W - player.radius - 10);
        player.x = canvasX;
    }
    
    // Цикл анимации
    function gameLoop() {
        updateGame();
        draw();
        requestAnimationFrame(gameLoop);
    }
    
    // Инициализация
    function init() {
        loadBest();
        resetGame();
        gameLoop();
        
        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            handleMove(e);
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleMove(e);
        });
        resetBtn.addEventListener('click', () => {
            resetGame();
            gameRunning = true;
            stars = [];
            meteors = [];
            for(let i=0;i<10;i++) spawnStar();
            score = 0;
            scoreSpan.innerText = '0';
        });
    }
    
    init();
</script>
</body>
</html>
